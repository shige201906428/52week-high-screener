name: Run 52-Week High Screener

on:
  schedule:
    # 毎日日本時間の20:00（UTC 11:00）に自動実行
    - cron: '0 11 * * *'
  workflow_dispatch: # 手動でいつでも実行できるようにするボタン

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 【変更後：末尾に tqdm を追加】
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas tqdm
        
    - name: Run screener
      run: python screener.py

    - name: Commit and Push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update screened data" && git push)
