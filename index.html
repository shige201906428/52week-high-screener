<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>52週間高値スクリーナー</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .market-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .us { background-color: #e3f2fd; color: #0d47a1; }
        .jp { background-color: #fff3e0; color: #e65100; }
    </style>
</head>
<body>

    <h1>52週間高値スクリーナー 結果</h1>
    <p>最新のスクリーニング結果を表示しています。</p>

    <table id="result-table">
        <thead>
            <tr>
                <th>市場</th>
                <th>ティッカー/コード</th>
                <th>銘柄名</th>
                <th>現在値</th>
                <th>52週高値</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        // data/results.json または screener が出力したデータを読み込む処理
        // ※実際のファイル名に合わせて調整してください
        fetch('data/results.json') 
            .then(response => response.json())
            .then(data => {
                const tbody = document.querySelector('#result-table tbody');
                tbody.innerHTML = ''; // クリア

                if (Object.keys(data).length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">高値を更新した銘柄はありませんでした。</td></tr>';
                    return;
                }

                for (const ticker in data) {
                    const info = data[ticker];
                    const isJp = !isNaN(ticker); // 数字だけなら日本株と判定
                    const row = `
                        <tr>
                            <td><span class="market-tag ${isJp ? 'jp' : 'us'}">${isJp ? '日本' : '米国'}</span></td>
                            <td><strong>${ticker}</strong></td>
                            <td>${info.name || info.Name || '-'}</td>
                            <td>${info.current_price || info.Price || info.Close || '-'}</td>
                            <td>${info.high_52week || info['52WeekHigh'] || '-'}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                }
            })
            .catch(error => {
                console.error('データの読み込みエラー:', error);
                document.querySelector('#result-table tbody').innerHTML = 
                    '<tr><td colspan="5" style="color:red;">データの読み込みに失敗しました。Pythonのデータが出力されているか確認してください。</td></tr>';
            });
    </script>
</body>
</html>
